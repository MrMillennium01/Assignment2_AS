syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.example.chat";
option java_outer_classname = "ChatProto";

package chat;

enum ClientRole {
  CLIENT_ROLE_UNSPECIFIED = 0;
  NORMAL = 1;
  ADMIN = 2;
}

message JoinRequest {
  string client_name = 1;
  ClientRole role = 2;
}

message SendMessageRequest {
  string sender = 1;
  ClientRole role = 2;
  string text = 3;
}

message DeleteMessageRequest {
  string message_id = 1;
  string deleted_by = 2;
  ClientRole role = 3;
}

message ChatMessage {
  string id = 1;
  string sender = 2;
  string text = 3;
  int64 timestamp_millis = 4;
  bool deleted = 5;
  string deleted_by = 6;
}

service ChatService {
  rpc Subscribe(JoinRequest) returns (stream ChatMessage);
  rpc SendMessage(SendMessageRequest) returns (ChatMessage);
  rpc DeleteMessage(DeleteMessageRequest) returns (ChatMessage);
}